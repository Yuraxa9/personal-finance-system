services:
  - type: web
    name: finance-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: https://finance-frontend.onrender.com
      - key: DEBUG
        value: "false"

  - type: web
    name: finance-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        value: https://finance-backend.onrender.com/api/v1

databases:
  - name: finance-db
    plan: free
    databaseName: finance
    user: finance_user
